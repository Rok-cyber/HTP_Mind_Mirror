<article class="rounded-lg border border-ink/10 bg-white p-5">
  <div class="flex items-start gap-3">
    <span
      class="mt-1 h-2.5 w-2.5 shrink-0 rounded-full"
      [class.bg-coral]="card.tone === 'signal'"
      [class.bg-saffron]="card.tone === 'context'"
      [class.bg-moss]="card.tone === 'support'"
    ></span>
    <div>
      <h4 class="text-base font-extrabold text-ink">{{ card.title }}</h4>
      <div class="legacy-html mt-2 text-sm leading-7 text-graphite" [innerHTML]="card.body | legacyHtml"></div>
    </div>
  </div>
</article>
