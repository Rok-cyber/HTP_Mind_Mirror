<main class="flex min-h-screen items-center justify-center bg-paper px-5 py-10">
  <section class="w-full max-w-md rounded-lg border border-ink/10 bg-white p-6 shadow-report">
    <p class="text-xs font-bold uppercase tracking-[0.18em] text-moss">HTP Signup</p>
    <h1 class="mt-3 text-3xl font-extrabold text-ink">회원가입</h1>
    <p class="mt-3 text-sm leading-7 text-graphite">계정을 만들고 내 리포트를 확인하세요.</p>

    <form class="mt-6 grid gap-4" (ngSubmit)="submit()">
      <label class="block">
        <span class="text-xs font-bold tracking-[0.12em] text-graphite">아이디</span>
        <input
          type="text"
          name="mb_id"
          [(ngModel)]="mbId"
          autocomplete="username"
          required
          class="mt-2 w-full rounded-lg border border-ink/10 bg-pearl px-3 py-3 text-sm font-bold text-ink outline-none focus:border-moss"
        />
      </label>

      <label class="block">
        <span class="text-xs font-bold tracking-[0.12em] text-graphite">이름</span>
        <input
          type="text"
          name="mb_name"
          [(ngModel)]="mbName"
          autocomplete="name"
          required
          class="mt-2 w-full rounded-lg border border-ink/10 bg-pearl px-3 py-3 text-sm font-bold text-ink outline-none focus:border-moss"
        />
      </label>

      <label class="block">
        <span class="text-xs font-bold tracking-[0.12em] text-graphite">이메일</span>
        <input
          type="email"
          name="mb_email"
          [(ngModel)]="mbEmail"
          autocomplete="email"
          class="mt-2 w-full rounded-lg border border-ink/10 bg-pearl px-3 py-3 text-sm font-bold text-ink outline-none focus:border-moss"
          placeholder="선택 입력"
        />
      </label>

      <label class="block">
        <span class="text-xs font-bold tracking-[0.12em] text-graphite">비밀번호</span>
        <input
          type="password"
          name="mb_password"
          [(ngModel)]="mbPassword"
          autocomplete="new-password"
          required
          minlength="4"
          class="mt-2 w-full rounded-lg border border-ink/10 bg-pearl px-3 py-3 text-sm font-bold text-ink outline-none focus:border-moss"
        />
      </label>

      @if (errorMessage) {
        <p class="rounded-lg border border-coral/30 bg-coral/10 px-4 py-3 text-sm font-bold text-coral">{{ errorMessage }}</p>
      }

      <button type="submit" class="rounded-lg bg-ink px-4 py-3 text-sm font-extrabold text-white disabled:opacity-50" [disabled]="loading">
        {{ loading ? '가입 중' : '회원가입' }}
      </button>
    </form>

    <p class="mt-5 text-sm font-bold text-graphite">
      이미 계정이 있으신가요?
      <a routerLink="/login" [queryParams]="redirect ? { redirect } : null" class="text-moss">로그인</a>
    </p>
  </section>
</main>
