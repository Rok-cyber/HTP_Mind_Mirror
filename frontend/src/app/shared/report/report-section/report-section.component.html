<article class="rounded-lg border border-ink/10 bg-pearl p-5 shadow-report sm:p-7 lg:p-8">
  <div class="grid gap-8 lg:grid-cols-[minmax(0,1fr)_420px]">
    <div class="grid gap-5">
      <div class="flex max-w-3xl flex-col gap-4 sm:flex-row sm:items-start sm:justify-between">
        <div>
          <p class="text-xs font-bold uppercase tracking-[0.18em] text-moss">{{ category.eyebrow }}</p>
          <h2 class="mt-2 text-3xl font-extrabold leading-tight text-ink">{{ category.title }}</h2>
          <p class="mt-3 text-sm leading-7 text-graphite">{{ category.description }}</p>
        </div>
        @if (reportId) {
          <a
            [routerLink]="['/report', reportId, 'sections', category.key]"
            class="shrink-0 rounded-lg border border-ink/10 bg-white px-3 py-2 text-xs font-extrabold text-ink hover:bg-paper"
          >
            View Details
          </a>
        }
      </div>

      <app-radar-chart
        [title]="category.title"
        [description]="chartDescription"
        [metrics]="category.metrics"
        [color]="category.color"
      />

      <div class="grid gap-3 sm:grid-cols-2 xl:grid-cols-3">
        @for (metric of category.metrics; track metric.key) {
          <app-score-card [metric]="metric" [color]="category.color" />
        }
      </div>
    </div>

    <aside class="grid content-start gap-4">
      <app-summary-box [title]="category.title" [text]="category.summary" />

      <div class="grid gap-3">
        @for (card of category.detailCards; track card.title) {
          <app-interpretation-card [card]="card" />
        }
      </div>

      <section class="rounded-lg border border-ink/10 bg-white p-5">
        <p class="text-xs font-bold uppercase tracking-[0.18em] text-graphite">Detail Notes</p>
        <div class="legacy-html mt-3 text-sm leading-7 text-graphite" [innerHTML]="category.detail | legacyHtml"></div>
      </section>
    </aside>
  </div>
</article>
