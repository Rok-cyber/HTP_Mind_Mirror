<header class="border-b border-ink/10 bg-pearl">
  <div class="mx-auto flex max-w-7xl flex-col gap-7 px-5 py-6 sm:px-8 lg:px-10 lg:py-8">
    <nav class="flex flex-wrap items-center justify-between gap-4">
      <a routerLink="/sample-report" class="text-sm font-bold tracking-[0.18em] text-ink">HTP Report</a>
      <div class="flex items-center gap-3 text-sm text-graphite">
        <span class="rounded-full border border-ink/10 px-3 py-1">{{ badge }}</span>
        <span>{{ date }}</span>
      </div>
    </nav>

    <section class="grid gap-5 lg:grid-cols-[1.15fr_0.85fr] lg:items-end">
      <div class="max-w-3xl">
        <p class="mb-2 text-xs font-semibold uppercase tracking-[0.18em] text-moss sm:text-sm">HTP Drawing Report</p>
        <h1 class="max-w-3xl text-3xl font-extrabold leading-tight text-ink sm:text-4xl lg:text-5xl">{{ title }}</h1>
        <p class="mt-3 max-w-2xl text-sm leading-6 text-graphite sm:text-base">{{ description }}</p>
      </div>

      <dl class="grid gap-3 rounded-lg border border-ink/10 bg-white p-4 shadow-report sm:grid-cols-3 lg:grid-cols-1">
        <div>
          <dt class="text-xs font-semibold uppercase tracking-[0.16em] text-graphite">Subject</dt>
          <dd class="mt-1 flex flex-wrap items-baseline gap-x-2 gap-y-1 text-base font-bold text-ink">
            <span>{{ user }}</span>
            @if (ageLabel) {
              <span class="text-sm font-semibold text-graphite">{{ ageLabel }}</span>
            }
          </dd>
        </div>
        <div>
          <dt class="text-xs font-semibold uppercase tracking-[0.16em] text-graphite">Type</dt>
          <dd class="mt-1 text-base font-bold text-ink">{{ type }}</dd>
        </div>
        <div>
          <dt class="text-xs font-semibold uppercase tracking-[0.16em] text-graphite">Date</dt>
          <dd class="mt-1 text-base font-bold text-ink">{{ date }}</dd>
        </div>
      </dl>
    </section>
  </div>
</header>
