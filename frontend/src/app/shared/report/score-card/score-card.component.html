<article class="rounded-lg border border-ink/10 bg-white p-4">
  <div class="flex items-start justify-between gap-4">
    <div>
      <h4 class="text-sm font-bold text-ink">{{ metric.label }}</h4>
      <p class="mt-1 text-xs font-semibold tracking-[0.08em] text-graphite">Display Score</p>
    </div>
    <strong class="text-2xl font-extrabold text-ink">{{ metric.score }}</strong>
  </div>
  <div class="mt-4 h-2 overflow-hidden rounded-full bg-ink/10">
    <div class="h-full rounded-full" [style.width.%]="metric.score" [style.background]="color"></div>
  </div>
</article>
