<section class="rounded-lg border border-ink/10 bg-white p-5 shadow-report sm:p-6">
  <div class="flex flex-col justify-between gap-3 sm:flex-row sm:items-end">
    <div>
      <p class="text-xs font-bold uppercase tracking-[0.18em] text-moss">Drawing Materials</p>
      <h2 class="mt-2 text-2xl font-extrabold text-ink">Original Sketchbook Drawings</h2>
    </div>
    <p class="max-w-md text-sm leading-7 text-graphite">
      Review the original drawing materials alongside the scores and detailed interpretation.
    </p>
  </div>

  @if (images.length === 0) {
    <div class="mt-7 rounded-lg border border-dashed border-ink/20 bg-paper px-5 py-6 text-sm font-bold text-graphite">
      No drawings uploaded
    </div>
  } @else {
    <div class="mt-7 grid grid-cols-[repeat(auto-fit,minmax(16rem,1fr))] gap-4">
    @for (image of sortedImages; track imageKey(image, $index); let index = $index) {
      <figure class="overflow-hidden rounded-lg border border-ink/10 bg-pearl">
        <div class="flex aspect-[4/3] items-center justify-center bg-white">
          <img [src]="imageUrl(image)" [alt]="'Drawing ' + (index + 1)" class="h-full w-full object-contain p-5">
        </div>
        <figcaption class="border-t border-ink/10 px-4 py-3">
          <p class="text-sm font-extrabold text-ink">Drawing {{ index + 1 }}</p>
          @if (image.note) {
            <p class="mt-1 text-sm leading-6 text-graphite">{{ image.note }}</p>
          }
        </figcaption>
      </figure>
    }
    </div>
  }
</section>
