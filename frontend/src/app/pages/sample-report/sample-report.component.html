<app-report-header
  [user]="report.info.user"
  [age]="report.info.age"
  [date]="report.info.date"
  [type]="report.info.type"
  title="HTP Sample Reflection Report"
  description="A demo report showing drawing placeholders, normalized scores, and section-level interpretation."
/>

<main class="bg-paper">
  <section class="mx-auto grid max-w-7xl gap-5 px-5 py-8 sm:px-8 lg:grid-cols-[minmax(0,1.45fr)_minmax(18rem,0.55fr)] lg:items-start lg:px-10">
    <div class="rounded-lg border border-ink/10 bg-white p-6 shadow-report sm:p-8">
      <p class="text-xs font-bold uppercase tracking-[0.18em] text-moss">Integrated Summary</p>
      <h2 class="mt-3 text-3xl font-extrabold leading-tight text-ink">Overall Interpretation</h2>
      <p class="mt-5 text-base leading-8 text-graphite">{{ report.summary }}</p>
    </div>

    <aside class="rounded-lg border border-ink/10 bg-pearl p-5">
      <p class="text-xs font-bold uppercase tracking-[0.18em] text-moss">Reading Guide</p>
      <h2 class="mt-2 text-lg font-extrabold leading-snug text-ink">Scores are reflection signals.</h2>
      <p class="mt-3 text-sm leading-6 text-graphite">
        This demo uses normalized display scores with 50 as the reference baseline.
      </p>
      <div class="mt-4 grid gap-2">
        <div class="flex items-center justify-between rounded-lg border border-ink/10 bg-white px-3 py-2.5">
          <span class="text-xs font-bold tracking-[0.12em] text-graphite">Baseline</span>
          <strong class="text-sm font-extrabold text-ink">50</strong>
        </div>
        <div class="flex items-center justify-between rounded-lg border border-ink/10 bg-white px-3 py-2.5">
          <span class="text-xs font-bold tracking-[0.12em] text-graphite">Domains</span>
          <strong class="text-sm font-extrabold text-ink">4</strong>
        </div>
        <div class="flex items-center justify-between rounded-lg border border-ink/10 bg-white px-3 py-2.5">
          <span class="text-xs font-bold tracking-[0.12em] text-graphite">Source</span>
          <strong class="text-sm font-extrabold text-ink">HTP</strong>
        </div>
      </div>
    </aside>
  </section>

  <section class="mx-auto max-w-7xl px-5 pb-12 sm:px-8 lg:px-10">
    <app-image-viewer [images]="report.images" />
  </section>

  <section class="mx-auto grid max-w-7xl gap-10 px-5 pb-16 sm:px-8 lg:px-10">
    @for (category of report.categories; track category.key) {
      <app-report-section [category]="category" chartDescription="Converted Scores by Domain" />
    }
  </section>
</main>
